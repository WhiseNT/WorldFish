services:
  worldfish:
    image: ghcr.io/666ghj/worldfish:latest
    # 加速镜像（如拉取缓慢可替换上方地址）
    # image: ghcr.nju.edu.cn/666ghj/worldfish:latest
    container_name: worldfish
    ports:
      - "5567:5567"
      - "5568:5568"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads